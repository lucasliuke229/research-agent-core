<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Research Agent Core — 科研工作台</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<!-- ════════════════════════ App Shell ════════════════════════ -->
<div class="app-shell">

  <!-- ═══ AppHeader ═══ -->
  <header class="app-header" id="app-header">
    <div class="header-left">
      <span class="header-logo">Research Agent <span>Core</span></span>
    </div>
    <div class="header-actions">
      <button class="header-btn primary" id="btn-new-task">新建任务</button>
      <button class="header-btn" disabled title="功能尚未实现">历史</button>
      <button class="header-btn" id="btn-settings-open" title="设置 AI 模型">设置</button>
      <button class="header-btn" id="btn-terminal-toggle" title="打开终端"><span class="text-mono">>_</span> 终端</button>
    </div>
  </header>

  <!-- ═══ TaskSidebar ═══ -->
  <aside class="app-sidebar" id="app-sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">今天</div>
      <div id="sidebar-list">
        <div class="sidebar-empty">暂无历史任务</div>
      </div>
    </div>
  </aside>

  <!-- ═══ Main Content ═══ -->
  <main class="app-main" id="app-main">

    <!-- ── TaskComposer ── -->
    <section class="main-section">
      <div class="card">
        <textarea class="task-input" id="task-input"
          placeholder="输入科研问题，例如：Anotine Georges 在 AI for Science 方面的研究贡献">Antoine Georges 在 AI for Science 方面的研究贡献</textarea>

        <!-- Run mode -->
        <div class="mode-row">
          <button class="mode-btn selected" id="mode-full">完整流水线</button>
          <button class="mode-btn" id="mode-custom">自定义流水线</button>
          <button class="mode-btn" id="mode-single">单模块运行</button>
        </div>

        <!-- Module selector -->
        <div class="module-grid" id="module-selector">
          <button class="module-chip selected" id="mod-chip-literature"><span class="chip-dot"></span>文献调研</button>
          <button class="module-chip selected" id="mod-chip-theory"><span class="chip-dot"></span>理论分析</button>
          <button class="module-chip selected" id="mod-chip-computation"><span class="chip-dot"></span>数值计算</button>
          <button class="module-chip selected" id="mod-chip-experiment"><span class="chip-dot"></span>实验设计</button>
          <button class="module-chip selected" id="mod-chip-report"><span class="chip-dot"></span>报告汇总</button>
        </div>

        <div class="action-row">
          <button class="btn-primary" id="btn-run">开始运行</button>
          <span class="text-xs" style="color:var(--text-muted)">或按 Cmd+Enter</span>
        </div>
      </div>
    </section>

    <!-- ── Execution Plan ── -->
    <section class="main-section">
      <div class="exec-plan visible" id="exec-plan">
        <div class="exec-plan-header">
          <span class="exec-plan-title">执行计划</span>
          <button class="exec-plan-edit" id="btn-edit-plan">编辑计划</button>
        </div>
        <div id="exec-plan-steps"></div>
      </div>
    </section>

    <!-- ── Pipeline Progress ── -->
    <section class="main-section">
      <div class="pipeline-list visible" id="pipeline-list"></div>
    </section>

    <!-- ── Results ── -->
    <section class="main-section">
      <div class="result-tabs" id="result-tabs">
        <nav class="tab-nav" id="tab-nav">
          <button class="tab-btn active" data-tab="overview">概览</button>
          <button class="tab-btn" data-tab="literature">文献与证据</button>
          <button class="tab-btn" data-tab="report">完整报告</button>
          <button class="tab-btn" data-tab="process">中间过程</button>
          <button class="tab-btn" data-tab="logs">运行日志</button>
        </nav>
        <div class="tab-panel active" id="tab-overview"></div>
        <div class="tab-panel" id="tab-literature"></div>
        <div class="tab-panel" id="tab-report"></div>
        <div class="tab-panel" id="tab-process"></div>
        <div class="tab-panel" id="tab-logs">
          <div class="log-toolbar">
            <button class="log-filter active" data-level="all">全部</button>
            <button class="log-filter" data-level="info">信息</button>
            <button class="log-filter" data-level="warning">警告</button>
            <button class="log-filter" data-level="error">错误</button>
            <span style="flex:1"></span>
            <button class="btn-ghost text-xs" id="btn-copy-logs">复制日志</button>
          </div>
          <div id="log-container"></div>
        </div>
      </div>
    </section>

  </main>

  <!-- ═══ RunInspector ═══ -->
  <aside class="app-inspect" id="app-inspect">
    <div id="inspector-content">
      <div class="inspect-section">
        <div class="inspect-label">运行状态</div>
        <span class="status-pill pending">就绪</span>
      </div>
      <div class="inspect-section">
        <div class="inspect-label">任务信息</div>
        <p class="text-sm" style="color:var(--text-muted)">尚未运行任务</p>
      </div>
      <div class="inspect-section">
        <div class="inspect-label">快捷操作</div>
        <div class="inspect-actions">
          <button class="inspect-action" disabled title="尚未运行任务">⟳ 重新运行</button>
          <button class="inspect-action" disabled title="尚未运行任务">📋 克隆任务</button>
        </div>
      </div>
    </div>
  </aside>

</div>

<!-- ════════════════════════ Settings Modal ════════════════════════ -->
<div class="modal-overlay" id="settings-modal">
  <div class="modal-panel">
    <div class="modal-header">
      <span class="modal-title">⚙ 设置</span>
      <button class="modal-close" id="btn-settings-close">✕</button>
    </div>
    <div class="modal-body">
      <!-- Preset provider selector -->
      <div class="field">
        <label class="label">模型服务商</label>
        <div class="preset-grid" id="preset-grid">
          <!-- Filled by JS -->
        </div>
      </div>
      <!-- Model name -->
      <div class="field">
        <label class="label" for="settings-model">模型名称</label>
        <input type="text" class="settings-input" id="settings-model"
          placeholder="例如 deepseek-chat, gpt-4o, claude-sonnet-4-20250514">
      </div>
      <!-- API base URL -->
      <div class="field">
        <label class="label" for="settings-base-url">API 地址</label>
        <input type="text" class="settings-input" id="settings-base-url"
          placeholder="https://api.deepseek.com">
      </div>
      <!-- API key -->
      <div class="field">
        <label class="label" for="settings-api-key">API Key（可选，覆盖 .env）</label>
        <input type="password" class="settings-input" id="settings-api-key"
          placeholder="sk-xxxxxxxx 或留空使用 .env 中的密钥">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" id="btn-settings-cancel">取消</button>
      <button class="btn-primary" id="btn-settings-save">保存设置</button>
    </div>
  </div>
</div>

<!-- ════════════════════════ Terminal Panel ════════════════════════ -->
<div class="terminal-panel" id="terminal-panel">
  <div class="terminal-bar">
    <span>终端 — bash</span>
    <button onclick="RA.App.toggleTerminal()" title="关闭终端">✕</button>
  </div>
  <div class="terminal-body" id="terminal-body"></div>
</div>

<!-- ════════════════════════ Scripts ════════════════════════ -->
<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
<script src="/js/adapter.js"></script>
<script src="/js/components.js"></script>
<script src="/js/app.js"></script>

</body>
</html>
